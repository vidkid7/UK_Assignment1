{% extends 'base.html' %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <h2 class="auth-title">Log In</h2>
                <p class="text-muted">New to this site? <a href="{{ url_for('register') }}">Sign Up</a></p>
            </div>

            <div class="d-grid gap-2 mb-3">
                <button class="btn btn-outline-primary"><i class="bi bi-facebook me-2"></i>Log in with Facebook</button>
                <button class="btn btn-outline-danger"><i class="bi bi-google me-2"></i>Log in with Google</button>
            </div>

            <div class="text-center my-3">
                <span class="text-muted small">or</span>
            </div>

            <form method="post" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label small">Email</label>
                    <input type="email" class="form-control" name="email" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <div class="mb-3">
                    <a href="#" class="small text-muted">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-dark w-100">Log In</button>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">or log in with</small>
                <div class="mt-2">
                    <a href="#" class="me-2"><i class="bi bi-facebook text-primary fs-5"></i></a>
                    <a href="#"><i class="bi bi-google text-danger fs-5"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
