{% extends 'base.html' %}
{% block title %}Customer Care{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="section-title text-center mb-2">CUSTOMER CARE</h2>
    <p class="text-center text-muted mb-4">Have any questions or concerns? We're always ready to help! Call us at <strong>+44 20 7946 0958</strong> or send us an email at <strong>info@stylevault.com</strong></p>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <form method="post" action="{{ url_for('contact') }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label small">Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Subject</label>
                            <input type="text" class="form-control" name="subject" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label small">Message</label>
                            <textarea class="form-control" name="message" rows="8" required></textarea>
                        </div>
                    </div>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-dark px-4">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
